      use_chat_completions_api: true

  - model_name: ark-auto
    litellm_params:
      model: openai/ark-code-latest
      api_base: https://ark.cn-beijing.volces.com/api/coding/v3
      api_key: os.environ/VOLCANO_ARK_API_KEY
      use_chat_completions_api: true

  # ------------------------------------------------------------
  # Codex model aliases -> route to kimi-k2.6
  # ------------------------------------------------------------
  - model_name: gpt-5.4
    litellm_params:
      model: openai/kimi-k2.6
