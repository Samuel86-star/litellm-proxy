general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
  set_verbose: false
  telemetry: false
  request_timeout: 600
  num_retries: 2
  callbacks:
    - tool_filter.deepseek_tool_filter
    - tool_filter.deepseek_v4_reasoning_fix
